<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive Everett interpretation simulation with branching quantum histories."
    />
    <title>Everett Branch Field</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="sim-stage" aria-label="Everett branch field simulation">
        <canvas id="everett-canvas"></canvas>
        <div class="hud" aria-live="polite">
          <div>
            <span class="hud-label">Branches</span>
            <strong id="branch-count">1</strong>
          </div>
          <div>
            <span class="hud-label">Coherence</span>
            <strong id="coherence-readout">100%</strong>
          </div>
          <div>
            <span class="hud-label">Born weight</span>
            <strong id="weight-readout">1.000</strong>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Simulation controls">
        <header>
          <p class="eyebrow">Everett interpretation</p>
          <h1>Branch Field</h1>
        </header>

        <div class="control-row">
          <label for="split-rate">Measurement rate</label>
          <input id="split-rate" type="range" min="0.15" max="2.5" step="0.05" value="0.95" />
        </div>
        <div class="control-row">
          <label for="decoherence">Decoherence</label>
          <input id="decoherence" type="range" min="0.05" max="1.6" step="0.05" value="0.7" />
        </div>
        <div class="control-row">
          <label for="interference">Interference memory</label>
          <input id="interference" type="range" min="0" max="1" step="0.02" value="0.42" />
        </div>

        <fieldset class="mode-group">
          <legend>Observer basis</legend>
          <label>
            <input type="radio" name="basis" value="position" checked />
            <span>Position</span>
          </label>
          <label>
            <input type="radio" name="basis" value="spin" />
            <span>Spin</span>
          </label>
          <label>
            <input type="radio" name="basis" value="phase" />
            <span>Phase</span>
          </label>
        </fieldset>

        <div class="actions">
          <button id="pause-button" type="button">Pause</button>
          <button id="seed-button" type="button">Reseed</button>
          <button id="collapse-button" type="button">Show single branch</button>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
